on: [push]

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.output.url }}
    steps:
      - uses: actions/checkout@v2
  deploy-frontend:
    name: Deploy frontend
    runs-on: ubuntu-latest
    needs: deploy-api
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: 14
      - name: Install dependencies
        working-directory: ./services/apps/static-preact-app
        run: npm ci
      - name: Build app
        working-directory: ./services/apps/static-preact-app
        build: npm run build
        start: npm run start
        run: npm run test
        wait-on: 'http://localhost:5000'
        env:
          APP_NAME: static-preact-app