  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: pnpm/action-setup@v2.2.2
      with:
        version: 7
    - name: Use Node.js 
      uses: actions/setup-node@v3
      with:
        node-version: 16
        cache: 'pnpm'
        cache-dependency-path: './services/apps/static-preact-app/pnpm-lock.yaml'
    - name: Install dependencies
      working-directory: ./services/apps/static-preact-app
      run: pnpm install --no-frozen-lockfile
    - name: Cypress run
      uses: cypress-io/github-action@v5
      with:
        install: false
        start: pnpm run start
        browser: chrome
        wait-on: 'http://localhost:5000'
