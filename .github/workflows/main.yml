  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: pnpm/action-setup@v2.2.2
      with:
        version: 7
    - name: Use Node.js 
      uses: actions/setup-node@v3
      with:
        node-version: 16
        cache: 'pnpm'
    - name: Install dependencies
      working-directory: ./services/apps/static-preact-app
      run: pnpm install
    - name: Run Cypress
      uses: cypress-io/github-action@v4
      with:
        browser: chrome
    - name: Run app
      working-directory: ./services/apps/static-preact-app
      #run: pnpm run start
      with:
        run: pnpm run start
        wait-on: 'http://localhost:5000'